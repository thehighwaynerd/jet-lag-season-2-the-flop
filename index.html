<!DOCTYPE html>
<html lang="en">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Flop Tracker - Singapore Board</title>
    <style>
        :root {
            --bg-color: #121824;
            --card-bg: #1e2640;
            --card-back-bg: #151b2d;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent-red: #ff4757;
            --accent-green: #2ed573;
            --accent-blue: #1e90ff;
            
            /* 3 Team Palette */
            --team-a: #ffa502;   /* Yellow/Orange */
            --team-b: #9b59b6;   /* Purple */
            --team-c: #ff007f;   /* Neon Pink */

            /* Region Border & Accent Colors */
            --region-west: #ffa502;      
            --region-north: #ff4757;     
            --region-central: #1e90ff;   
            --region-northeast: #2ed573; 
            --region-east: #f1c40f;      
            --region-sentosa: #a55eea;   
            --region-wild: #ffffff;      
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        header h1 span { color: var(--accent-red); }
        header p { color: var(--text-muted); font-size: 1.1rem; }

        /* 3-Team Scoreboard */
        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex-wrap: wrap;
        }
        .score-a { color: var(--team-a); }
        .score-b { color: var(--team-b); }
        .score-c { color: var(--team-c); }

        /* Grid Layout */
        .district-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .flip-card { background-color: transparent; height: 500px; perspective: 1000px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: left; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }

        .card-front { background-color: var(--card-bg); cursor: pointer; display: flex; flex-direction: column; }
        .map-container { width: 100%; height: 160px; background-color: #151b2d; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 2px solid rgba(255, 255, 255, 0.1); flex-shrink: 0; }
        .map-container img { width: 100%; height: 100%; object-fit: contain; padding: 10px; box-sizing: border-box; }

        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .card-content h2 { font-size: 1.3rem; margin: 10px 0 5px 0; text-transform: uppercase; flex-shrink: 0; }
        
        /* Region Text Rules */
        .txt-west { color: var(--region-west); }
        .txt-north { color: var(--region-north); }
        .txt-central { color: var(--region-central); }
        .txt-northeast { color: var(--region-northeast); }
        .txt-east { color: var(--region-east); }
        .txt-sentosa { color: var(--region-sentosa); }
        .txt-wild { color: var(--region-wild); text-shadow: 0 0 8px rgba(255,255,255,0.4); }

        .card-content p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.5; margin: 0; }

        .badge-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; flex-shrink: 0; }
        .borders-badge { background-color: rgba(255, 255, 255, 0.15); color: #fff; font-size: 0.75rem; font-weight: bold; padding: 4px 8px; border-radius: 6px; }
        .challenge-tag { background-color: var(--card-back-bg); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; max-width: 65%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Back Card Layout */
        .card-back { background-color: var(--card-back-bg); transform: rotateY(180deg); padding: 24px; box-sizing: border-box; display: flex; flex-direction: column; border: 2px solid var(--accent-red); }
        .border-west { border-color: var(--region-west); }
        .border-north { border-color: var(--region-north); }
        .border-central { border-color: var(--region-central); }
        .border-northeast { border-color: var(--region-northeast); }
        .border-east { border-color: var(--region-east); }
        .border-sentosa { border-color: var(--region-sentosa); }
        .border-wild { border-color: var(--region-wild); }

        .challenge-header { border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 10px; margin-bottom: 15px; flex-shrink: 0; }
        .challenge-title { font-size: 1.1rem; font-weight: bold; text-transform: uppercase; }

        .challenge-body { font-size: 0.9rem; line-height: 1.6; flex-grow: 1; overflow-y: auto; margin-bottom: 15px; white-space: pre-wrap; color: var(--text-muted); }
        .challenge-body strong { color: #fff; display: block; margin-bottom: 6px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; }

        /* 3-Button Layout */
        .button-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: auto; flex-shrink: 0; }
        .team-btn { color: #fff; border: none; padding: 12px 2px; border-radius: 6px; font-weight: bold; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; text-align: center; }
        .btn-a { background-color: var(--team-a); color: #121824; }
        .btn-b { background-color: var(--team-b); }
        .btn-c { background-color: var(--team-c); }
        .team-btn:hover { opacity: 0.9; }

        footer { margin-top: 50px; text-align: center; padding-bottom: 40px; }

        @media (max-width: 768px) {
            .scoreboard { flex-direction: column; align-items: center; gap: 10px; }
            .button-group { grid-template-columns: 1fr; }
            .flip-card { height: 540px; }
        }
    </style>
</head>

        // RENDER THE MATRIX BOARD (Shows the first 9 elements of your array synchronously)

            // Slice out the first 9 elements to create the uniform starter layout

            });

            cardEl.className = 'flip-card';
            cardEl.setAttribute('data-id', data.id);

            const headerColorStyle = `style="color: var(--region-${data.region})"`;

                            <button class="team-btn btn-c">Team C</button>
                        </div>
                    </div>

            `;
            return cardEl;
        }

        // ⚡ BROADCAST SIGNAL SENDER
        function toggleFlip(cardElement) {
            cardElement.classList.toggle('flipped');
            const cardId = cardElement.getAttribute('data-id');

            if (gameChannel && cardId) {
                gameChannel.send({
                    type: 'broadcast',
                    event: 'cardFlipped',
                    payload: { cardId: cardId }
                });
            }
        }

        // ⚡ BROADCAST SIGNAL LISTENER (Real-time tracking)
        if (gameChannel) {
            gameChannel.on('broadcast', { event: 'cardFlipped' }, (response) => {
                const receivedCard = document.querySelector(`[data-id="${response.payload.cardId}"]`);
                if (receivedCard) {
                    receivedCard.classList.toggle('flipped'); 
                }
            }).subscribe();
        }

        // Run setup sequence immediately on screen startup
        renderBoard();
